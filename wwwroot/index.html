   window.googleLogin = async () => {
    const provider = new firebase.auth.GoogleAuthProvider();

    try {
        const result = await firebase.auth().signInWithPopup(provider);
        const user = result.user;

        // --- OBTENER EL TOKEN DE ID ---
        const idToken = await user.getIdToken();

        console.log("googleLogin OK", user.email);

        // Guardamos el token en localStorage para que el FirebaseService lo use
        localStorage.setItem("firebaseToken", idToken);

        return {
            email: user?.email || "",
            displayName: user?.displayName || ""
        };
    } catch (error) {
        console.error("Error Login:", error);
        throw error;
    }
};

window.googleLogout = async () => {
    await firebase.auth().signOut();
    localStorage.removeItem("firebaseToken"); // Limpiar el token al salir
};

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        Blazor.start().then(() => {
            var splash = document.getElementById("splash");
            if (splash) splash.remove();
        }).catch(err => {
            console.error("Error al iniciar Blazor:", err);

    <script>
        // NAMESPACE PRINCIPAL
        window.adsum = window.adsum || {};
        window.adsumNav = window.adsumNav || {};

        // 1) Registro de Scroll unificado (Corrigiendo el error de consola)
        window.adsum.registerScrollListener = function (dotnetRef) {
            if (!dotnetRef) return;

            const scrollHandler = () => {
                dotnetRef.invokeMethodAsync("OnScroll", window.scrollY);
            };

            // Limpiamos listener previo para evitar duplicados
            window.removeEventListener("scroll", window.adsum._currentHandler);
            window.adsum._currentHandler = scrollHandler;
            
            window.addEventListener("scroll", scrollHandler, { passive: true });
            scrollHandler(); // Ejecución inicial
        };

        // Aliado para el NavMenu
        window.adsumNav.registerScroll = window.adsum.registerScrollListener;

        // 2) Visibilidad de Navbar
        window.adsum.setNavHidden = function (hidden) {
            var nav = document.getElementById('mainNav') || document.querySelector('.topbar');
            if (nav) {
                if (hidden) {
                    nav.classList.add('nav-hidden');
                } else {
                    nav.classList.remove('nav-hidden');
                }
            }
        };

        window.adsumNav.setBodyNavPadding = (enabled) => {
            if (enabled) document.body.classList.add("has-topbar");
            else document.body.classList.remove("has-topbar");
        };

        // 3) Scroll suave
        window.scrollToElement = (elementId) => {
            var element = document.getElementById(elementId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // 4) Animaciones de Contadores para el Home
        window.iniciarAnimacionesHome = function () {
            const counters = document.querySelectorAll('.stat-number');
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                if (!target) return;
                
                let count = 0;
                const speed = target / 50; 
                
                const updateCount = () => {
                    if (count < target) {
                        count += speed;
                        let prefix = (target >= 20) ? '+' : '';
                        counter.innerText = prefix + Math.ceil(count);
                        setTimeout(updateCount, 20);
                    } else {
                        counter.innerText = (target >= 20 ? '+' : '') + target;
                    }
                };
                updateCount();
            });
        };

        window.pdfHelper = {
    toBlobUrl: function (dataUrl) {
        if (!dataUrl || !dataUrl.startsWith("data:application/pdf;base64,")) {
            return "";
        }

        const base64 = dataUrl.split(",")[1];
        const byteCharacters = atob(base64);
        const byteNumbers = new Array(byteCharacters.length);

        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }

        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], { type: "application/pdf" });
        return URL.createObjectURL(blob);
    }
};
    </script>
