<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdsumPater</title>
    <base href="/" />

    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="AdsumPater.styles.css" rel="stylesheet" />

    <link rel="icon" type="image/png" href="img/LogoAdsum-Claro.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div id="splash">
            <div class="spinner"></div>
            <div class="splash-text">Cargando AdsumPater...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqj_-fRz-eHZ7wW1UbRSo0msUqR6xK_rc",
            authDomain: "adsum-pater-web.firebaseapp.com",
            databaseURL: "https://adsum-pater-web-default-rtdb.firebaseio.com",
            projectId: "adsum-pater-web",
            storageBucket: "adsum-pater-web.firebasestorage.app",
            messagingSenderId: "311597691546",
            appId: "1:311597691546:web:c2b3979c9a5c23ba52e523"
        };

        firebase.initializeApp(firebaseConfig);

        window.googleLogin = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                return { email: user.email, displayName: user.displayName };
            } catch (error) {
                console.error("Error Login:", error);
                return null;
            }
        };

        window.googleLogout = async () => {
            await firebase.auth().signOut();
        };
    </script>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        Blazor.start().then(() => {
            var splash = document.getElementById("splash");
            if (splash) splash.remove();
        }).catch(err => {
            console.error("Error al iniciar Blazor:", err);
        });
    </script>

    <script>
        navigator.serviceWorker.register('service-worker.js');
    </script>

    <script>
        // 1) Namespace principal
        window.adsum = window.adsum || {};

        // Ocultar/mostrar navbar (lo que ya tenías)
        window.adsum.setNavHidden = function (hidden) {
            var nav = document.querySelector('nav') || document.querySelector('.navbar');
            if (nav) {
                nav.style.display = hidden ? 'none' : 'flex';
            }
        };

        // ✅ FIX: esta función es la que te estaba faltando (la que Blazor llama)
        // La dejamos como alias a tu implementación real en adsumNav.registerScroll
        window.adsum.registerScrollListener = function (dotnetRef) {
            // Si tu C# no pasa dotnetRef, no hacemos nada y no rompe
            if (!dotnetRef) return;

            if (window.adsumNav && typeof window.adsumNav.registerScroll === "function") {
                window.adsumNav.registerScroll(dotnetRef);
                return;
            }

            // Fallback por si adsumNav no existe
            const handler = () => dotnetRef.invokeMethodAsync("OnScroll", window.scrollY);
            window.addEventListener("scroll", handler, { passive: true });
            handler();
        };

        // 2) Scroll suave para los botones de "Colaborar"
        window.scrollToElement = (elementId) => {
            var element = document.getElementById(elementId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // 3) Animaciones del Home (Contadores)
        window.iniciarAnimacionesHome = function () {
            const counters = document.querySelectorAll('.stat-number');
            counters.forEach(counter => {
                counter.innerText = '0';
                const updateCount = () => {
                    const target = +counter.getAttribute('data-target');
                    const count = +counter.innerText.replace('+', '');
                    const speed = target / 100;
                    if (count < target) {
                        let prefix = (target === 700 || target === 30) ? '+' : '';
                        counter.innerText = prefix + Math.ceil(count + speed);
                        setTimeout(updateCount, 20);
                    } else {
                        let prefix = (target === 700 || target === 30) ? '+' : '';
                        counter.innerText = prefix + target;
                    }
                };
                updateCount();
            });
        };

        // 4) Lógica del Navbar Scroll (tu implementación real)
        window.adsumNav = window.adsumNav || {};

        window.adsumNav.registerScroll = (dotnetRef) => {
            const handler = () => dotnetRef.invokeMethodAsync("OnScroll", window.scrollY);
            window.removeEventListener("scroll", window.adsumNav._handler);
            window.adsumNav._handler = handler;
            window.addEventListener("scroll", handler, { passive: true });
            handler();
        };

        window.adsumNav.setBodyNavPadding = (enabled) => {
            if (enabled) document.body.classList.add("has-topbar");
            else document.body.classList.remove("has-topbar");
        };
    </script>
</body>
</html>
